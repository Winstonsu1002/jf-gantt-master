                saveSettings();
                renderSettingsParams();
            }
        }

        function saveSettings() {
            localStorage.setItem('marketing_settings_v2', JSON.stringify(settings));
            renderFormOptions(); // Reflect immediately if needed
        }

        // --- Migration from V1 to V2 Data (One-time check) ---
        (function migrateData() {
            if (!localStorage.getItem('marketing_tasks_v2') && localStorage.getItem('marketing_tasks')) {
                const old = JSON.parse(localStorage.getItem('marketing_tasks'));
                const nowY = new Date().getFullYear();
                tasks = old.map(t => {
                    // Reverse calc: (M-1)*3 + P + 1 = idx
                    const startM = Math.ceil(t.startIdx / 3);
                    const startP = (t.startIdx - 1) % 3;
                    const endM = Math.ceil((t.startIdx + t.span - 1) / 3);
                    const endP = ((t.startIdx + t.span - 1) - 1) % 3;
                    const evM = Math.ceil(t.eventIdx / 3);
                    const evP = (t.eventIdx - 1) % 3;

                    return {
                        id: t.id,
                        name: t.name,
                        category: t.category,
                        func: t.func,
                        startYear: nowY, startMonth: startM, startPeriod: startP,
                        endYear: nowY, endMonth: endM, endPeriod: endP,
                        eventYear: nowY, eventMonth: evM, eventPeriod: evP,
                        customSortIndex: 9999
                    };
                });
                saveTasks();
                // Optionally clear old key to avoid re-migration
                // localStorage.removeItem('marketing_tasks');
            }
        })();

        // --- Sidebar ---
        function toggleSidebar() {
            const sb = document.getElementById('mainSidebar');
            const toggleBtn = document.getElementById('sidebarToggle');
            if (sb.classList.contains('w-0')) {
                sb.classList.remove('w-0', 'overflow-hidden');
                sb.classList.add('w-[320px]');
                toggleBtn.innerHTML = '☰';
                toggleBtn.title = '收合側欄';
            } else {
                sb.classList.remove('w-[320px]');
                sb.classList.add('w-0', 'overflow-hidden');
                toggleBtn.innerHTML = '☰';
                toggleBtn.title = '展開側欄';
            }
        }

        // --- Export ---
        function exportImage() {
            const area = document.getElementById('captureArea');
            const mainContainer = document.querySelector('main.gantt-container');
            
            if (!area) {
                alert('無法找到要截圖的區域');
                return;
            }

            // ===== 1. 鎖定視窗 =====
            const originalScrollX = window.scrollX;
            const originalScrollY = window.scrollY;
            
            // 記錄原始樣式
            const originalBodyOverflow = document.body.style.overflow;
            const originalBodyWidth = document.body.style.width;
            const originalBodyHeight = document.body.style.height;
            
            const originalMainOverflow = mainContainer ? mainContainer.style.overflow : '';
            const originalMainWidth = mainContainer ? mainContainer.style.width : '';
            const originalMainHeight = mainContainer ? mainContainer.style.height : '';
            
            const originalAreaWidth = area.style.width;
            const originalAreaHeight = area.style.height;

            // ===== 2. DOM 變形 (Pre-Capture) =====
            
            // 強制 overflow 為 visible
            document.body.style.overflow = 'visible';
            if (mainContainer) {
                mainContainer.style.overflow = 'visible';
            }

            // 取得完整尺寸（加上 padding 避免邊緣被切）
            const padding = 20;
            const scrollWidth = area.scrollWidth + padding;
            const scrollHeight = area.scrollHeight + padding;

            // 強制設定 captureArea 的寬高
            area.style.width = scrollWidth + 'px';
            area.style.height = scrollHeight + 'px';

            // 找出所有 sticky 元素並暫時移除 sticky 定位
            const stickyElements = [];
            const allElements = area.querySelectorAll('*');
            
            allElements.forEach(el => {
                const computedStyle = window.getComputedStyle(el);
                if (computedStyle.position === 'sticky') {
                    stickyElements.push({
                        element: el,
                        originalPosition: el.style.position,
                        originalTop: el.style.top,
                        originalLeft: el.style.left,
                        originalRight: el.style.right,
                        originalBottom: el.style.bottom,
                        originalZIndex: el.style.zIndex
                    });
                    
                    // 強制改為 relative，移除定位屬性
                    el.style.position = 'relative';
                    el.style.top = '';
                    el.style.left = '';
                    el.style.right = '';
                    el.style.bottom = '';
                    // 保留 z-index 以避免層疊問題（視情況可移除）
                    // el.style.zIndex = '';
                }
            });

            // ===== 3. 執行截圖 =====
            const options = {
                scale: 2,
                useCORS: true,
                allowTaint: true,
                windowWidth: scrollWidth,
                windowHeight: scrollHeight,
                backgroundColor: '#ffffff'
            };

            // 使用 setTimeout 確保 DOM 變更已生效
            setTimeout(() => {
                html2canvas(area, options).then(canvas => {
                    // ===== 4. 復原 DOM (Post-Capture) =====
                    
                    // 恢復 sticky 元素的樣式
                    stickyElements.forEach(({ element, originalPosition, originalTop, originalLeft, originalRight, originalBottom, originalZIndex }) => {
                        element.style.position = originalPosition;
                        element.style.top = originalTop;
                        element.style.left = originalLeft;
                        element.style.right = originalRight;
                        element.style.bottom = originalBottom;
                        element.style.zIndex = originalZIndex;
                    });

                    // 恢復容器樣式
                    document.body.style.overflow = originalBodyOverflow;
                    document.body.style.width = originalBodyWidth;
                    document.body.style.height = originalBodyHeight;
                    
                    if (mainContainer) {
                        mainContainer.style.overflow = originalMainOverflow;
                        mainContainer.style.width = originalMainWidth;
                        mainContainer.style.height = originalMainHeight;
                    }

                    area.style.width = originalAreaWidth;
                    area.style.height = originalAreaHeight;

                    // 恢復捲動位置
                    window.scrollTo(originalScrollX, originalScrollY);

                    // 建立下載連結
                    const link = document.createElement('a');
                    const dateStr = new Date().toISOString().slice(0, 10);
                    link.download = `Marketing_Schedule_${dateStr}.png`;
                    link.href = canvas.toDataURL();
                    link.click();
                }).catch(error => {
                    // 發生錯誤時也要恢復所有樣式
                    stickyElements.forEach(({ element, originalPosition, originalTop, originalLeft, originalRight, originalBottom, originalZIndex }) => {
                        element.style.position = originalPosition;
                        element.style.top = originalTop;
                        element.style.left = originalLeft;
                        element.style.right = originalRight;
                        element.style.bottom = originalBottom;
                        element.style.zIndex = originalZIndex;
                    });

                    document.body.style.overflow = originalBodyOverflow;
                    document.body.style.width = originalBodyWidth;
                    document.body.style.height = originalBodyHeight;
                    
                    if (mainContainer) {
                        mainContainer.style.overflow = originalMainOverflow;
                        mainContainer.style.width = originalMainWidth;
                        mainContainer.style.height = originalMainHeight;
                    }

                    area.style.width = originalAreaWidth;
                    area.style.height = originalAreaHeight;

                    window.scrollTo(originalScrollX, originalScrollY);

                    console.error('截圖失敗:', error);
                    alert('截圖失敗，請稍後再試');
                });
            }, 100); // 給予 100ms 讓 DOM 變更生效
        }

        function exportCSV() {
            let csv = "專案名稱,分類,職能,開始日期,結束日期,上線日期\n";
            tasks.forEach(t => {
                csv += `${t.name},${t.category},${getFuncName(t.func)},${t.startYear}/${t.startMonth}-${['上', '中', '下'][t.startPeriod]},${t.endYear}/${t.endMonth}-${['上', '中', '下'][t.endPeriod]},${t.eventYear}/${t.eventMonth}-${['上', '中', '下'][t.eventPeriod]}\n`;
            });
            const link = document.createElement("a");
            link.href = 'data:text/csv;charset=utf-8,\uFEFF' + encodeURI(csv);
            link.download = `marketing_gantt_v2.csv`;
            link.click();
        }

        // --- JSON Backup/Restore ---
        function exportJSON() {
            const data = {
                version: "2.0",
                timestamp: new Date().toISOString(),
                tasks: tasks,
                settings: settings
            };
            const json = JSON.stringify(data, null, 2);
            const blob = new Blob([json], { type: "application/json" });
            const url = URL.createObjectURL(blob);

            const link = document.createElement('a');
            link.href = url;
            link.download = `marketing_gantt_backup_${new Date().toISOString().slice(0, 10)}.json`;
            link.click();
            URL.revokeObjectURL(url);
        }

        function importJSON(input) {
            const file = input.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function (e) {
                try {
                    const data = JSON.parse(e.target.result);
                    if (!data.tasks || !data.settings) {
                        alert('無效的備份檔案格式');
                        return;
                    }

                    if (confirm(`確定要還原備份嗎？\n這將會覆蓋當前所有資料！\n(備份時間: ${data.timestamp || '未知'})`)) {
                        tasks = data.tasks;
                        settings = data.settings;
                        saveTasks();
                        saveSettings();

                        // Re-init UI
                        init();
                        alert('✅ 還原成功！');
                    }
                } catch (err) {
                    alert('讀取檔案失敗：' + err);
                }
                // Reset input
                input.value = '';
            };
            reader.readAsText(file);
        }

        // --- Passcode Gate ---
        const PASSCODE = '1002';
        const AUTH_KEY = 'jf_gantt_auth';

        function checkPasscode() {
            const input = document.getElementById('passcodeInput').value;
            if (input === PASSCODE) {
                sessionStorage.setItem(AUTH_KEY, '1');
                document.getElementById('passcodeGate').style.display = 'none';
                document.getElementById('passcodeInput').value = '';
            } else {
                document.getElementById('passcodeError').classList.remove('hidden');
                document.getElementById('passcodeInput').value = '';
                document.getElementById('passcodeInput').focus();
            }
        }

        (function initAuth() {
            if (sessionStorage.getItem(AUTH_KEY) === '1') {
                document.getElementById('passcodeGate').style.display = 'none';
            } else {
                setTimeout(() => document.getElementById('passcodeInput').focus(), 100);
            }
        })();

        // Run
        init();
    </script>
